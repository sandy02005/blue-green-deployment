apiVersion: batch/v1
kind: CronJob
metadata:
  name: node-app-job
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: node-app-job
            image: alpine   
            command: ["echo", "Welcome to my Node app"]
          restartPolicy: Never
